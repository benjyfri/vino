dataset:
  dataset: bbbp
  root: data/raw
  task_type: binary_classification
  limit: null
image:
  n_max: 256
  channels:
  - topology
  - node_cov
  - edge_cov
  final_range:
  - 0
  - 1
  pad_value: 0.0
  topology:
    mode: apsp_heat
    sigma: 0.35
    power: 2.0
    disconnected_value: 0.0
    diagonal_value: 1.0
  canonicalization:
    mode: fiedler_apsp
    laplacian: symmetric_normalized
    sign_rule: lexicographic_topology
    eigengap_tol: 1.0e-06
    tie_tol: 1.0e-08
    lex_round_decimals: 8
  propagation:
    operator: sym_norm_adj_self_loop
    powers:
    - 0
    - 1
    - 2
    weights:
    - 1.0
    - 0.5
    - 0.25
  node_cov:
    enabled: true
    h: 64
    seed: 123
    standardize: per_graph
    robust_quantile: 0.95
    clip: 1.0
  edge_cov:
    enabled: true
    h: 64
    seed: 456
    missing_edge_attr: ones
    aggregation: mean_incident
    robust_quantile: 0.95
    clip: 1.0
model:
  backbone_name: facebook/dinov3-vits16-pretrain-lvd1689m
  backbone_type: hf_auto
  pretrained_path: null
  freeze_mode: train_patch_embed
  pooling: auto
  normalize_lvd_imagenet: true
  input_mode: resize_bilinear
  input_size: 224
  patch_size: 16
  token_grid_size: 32
  resize_mode: bilinear
  input_adapter:
    type: conv1x1
  head:
    type: binary
    hidden_dim: 256
    dropout: 0.1
  model_name: facebook/dinov3-vits16-pretrain-lvd1689m
  input_stem:
    enabled: false
train:
  task_type: binary_classification
  epochs: 50
  batch_size: 32
  lr_head: 0.001
  lr_backbone: 1.0e-05
  weight_decay: 0.0001
  amp: true
  grad_clip: 1.0
  early_stopping_patience: 10
  metric_for_best: val_roc_auc
  metric_mode: max
  seed: 42
  num_workers: 8
  pos_weight: auto
